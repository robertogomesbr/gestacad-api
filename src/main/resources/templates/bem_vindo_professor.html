<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boas Vindas ao Sistema GestAcad</title>
</head>

<body style="margin:0; padding:0; background:#f3f6f4; font-family:'Segoe UI', Tahoma, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0" 
           style="background:#f3f6f4; padding:40px 0;">
        <tr>
            <td align="center">

                <!-- Card Principal -->
                <table width="600" cellpadding="0" cellspacing="0" border="0"
                       style="background:#ffffff;  overflow:hidden; box-shadow:0 4px 18px rgba(0,0,0,0.08);">

                    <!-- Header -->
                    <tr>
                        <td style="background:#008000; padding:35px 40px; text-align:center;">
                            <h1 style="margin:0; color:#ffffff; font-size:32px; font-weight:bold;">
                                GestAcad
                            </h1>

                            <p style="margin-top:10px; color:#dff5df; font-size:16px;">
                                Sistema Acadêmico
                            </p>
                        </td>
                    </tr>

                    <!-- Conteúdo -->
                    <tr>
                        <td style="padding:45px 40px; color:#333333;">

                            <h2 style="margin-top:0; color:#008000; font-size:28px;">
                                Boas-vindas, Professor(a)!
                            </h2>

                            <p style="font-size:18px; margin-bottom:25px;">
                                Olá,
                                <strong>
                                    <span th:text="${professor.nome} ?: ''"></span>
                                </strong>
                            </p>

                            <p style="font-size:16px; line-height:1.8;">
                                Seu cadastro foi aprovado com sucesso no
                                <strong>GestAcad</strong>.
                            </p>

                            <p style="font-size:16px; line-height:1.8;">
                                Agora você já pode acessar o sistema e aproveitar
                                os recursos de gerenciamento de aulas, turmas e salas.
                            </p>

                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td style="background:#f5f5f5; padding:20px; text-align:center; color:#777777; font-size:13px;">
                            © 2026 GestAcad - Instituto Federal de Pernambuco
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
