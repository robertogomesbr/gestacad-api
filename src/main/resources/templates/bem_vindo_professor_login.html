<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil do Professor - GestAcad</title>
</head>

<body style="margin:0; padding:0; background:#f3f6f4; font-family:'Segoe UI', Tahoma, sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" border="0"
           style="background:#f3f6f4; padding:40px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0" border="0"
                       style="background:#ffffff; box-shadow:0 4px 18px rgba(0,0,0,0.08);">

                    <!-- Cabeçalho -->
                    <tr>
                        <td style="background:#008000; padding:35px 40px; text-align:center;">
                            <h1 style="margin:0; color:#ffffff; font-size:32px;">
                                GestAcad
                            </h1>

                            <p style="margin-top:10px; color:#dff5df; font-size:16px;">
                                Perfil do Professor
                            </p>
                        </td>
                    </tr>

                    <!-- Dados do Professor -->
                    <tr>
                        <td style="padding:40px;">

                            <h2 style="margin-top:0; color:#008000;">
                                Dados do Usuário Logado
                            </h2>

                            <table width="100%" cellpadding="10" cellspacing="0"
                                   style="border-collapse:collapse; margin-top:20px;">

                                <tr>
                                    <td style="font-weight:bold; width:35%;">
                                        Nome:
                                    </td>
                                    <td>
                                        <span th:text="${professor.nome}"></span>
                                    </td>
                                </tr>

                                <tr style="background:#f8f8f8;">
                                    <td style="font-weight:bold;">
                                        Email:
                                    </td>
                                    <td>
                                        <span th:text="${professor.email}"></span>
                                    </td>
                                </tr>

                                <tr>
                                    <td style="font-weight:bold;">
                                        SIAPE:
                                    </td>
                                    <td>
                                        <span th:text="${professor.siape}"></span>
                                    </td>
                                </tr>

                                <tr style="background:#f8f8f8;">
                                    <td style="font-weight:bold;">
                                        Situação:
                                    </td>
                                    <td>
                                        <span style="color:green; font-weight:bold;">
                                            Ativo
                                        </span>
                                    </td>
                                </tr>

                            </table>

                        </td>
                    </tr>

                    <!-- Rodapé -->
                    <tr>
                        <td style="background:#f5f5f5; padding:20px; text-align:center; color:#777777; font-size:13px;">
                            © 2026 GestAcad - Instituto Federal de Pernambuco
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>
</html>
